# RSDDs Rail Defect Dataset Configuration
# ========================================

defaults:
  - default


  root: ./data/RSDDs
  train_split: 0.8
  classes: [crack]
  annotation_type: pixel  # for evaluation only

training:
  epochs: 150
  batch_size: 8  # smaller due to high-res images
  lambda_topo: 0.5  # emphasize topological constraint for cracks

evaluation:
  metrics: [mIoU, BF1, ConnectivityError]
  cross_validation_folds: 5  # 5-fold CV for small dataset